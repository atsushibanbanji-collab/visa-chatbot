services:
  - type: web
    name: gf-visa-chatbot
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0
